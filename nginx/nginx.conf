# Nginx configuration with reverse proxy for Nextcloud
# JSON access logging for anomaly detection

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # JSON log format for anomaly detection
    log_format json_log escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"source_ip":"$http_x_forwarded_for",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"protocol":"$server_protocol",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer"'
        '}';

    access_log /var/log/nginx/hng-access.log json_log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 512M;  # Allow large file uploads to Nextcloud

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-component text/x-cross-domain-policy;

    # Upstream Nextcloud server
    upstream nextcloud {
        server nextcloud:80;
    }

    server {
        listen 80;
        server_name _;

        # Trust X-Forwarded-For header from reverse proxy
        set_real_ip_from 172.16.0.0/12;  # Docker internal network
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # Redirect HTTP to HTTPS (if needed in production)
        # return 301 https://$server_name$request_uri;

        # Nextcloud proxy configuration
        location / {
            proxy_pass http://nextcloud;
            
            # Forward real client IP
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://nextcloud;
            proxy_cache_valid 200 7d;
            expires 7d;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }
}
